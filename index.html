<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Heart Flow</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

.container {
  position: relative;
  width: 500px;
  height: 500px;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
}

.love {
  position: absolute;
  color: #ff9bdc;
  font-size: 14px;
  white-space: nowrap;
  text-shadow: 0 0 6px #ff9bdc;
}
</style>
</head>

<body>

<div class="container" id="heart"></div>

<script>
const container = document.getElementById("heart");
const count = 40; // yazı sayısı (mesafeyi belirler)

let items = [];

// eleman oluştur
for (let i = 0; i < count; i++) {
  let el = document.createElement("div");
  el.className = "love";
  el.innerText = "I love you";
  container.appendChild(el);

  // HER BİRİNE FARKLI BAŞLANGIÇ (asıl olay bu)
  items.push({
    el: el,
    t: (i / count) * Math.PI * 2
  });
}

function animate() {
  items.forEach(item => {

    item.t += 0.02; // hız

    let t = item.t;

    // ❤️ kalp formülü
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t)
          - 5 * Math.cos(2*t)
          - 2 * Math.cos(3*t)
          - Math.cos(4*t);

    let scale = 12;

    item.el.style.left = (250 + x * scale) + "px";
    item.el.style.top  = (250 - y * scale) + "px";
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
