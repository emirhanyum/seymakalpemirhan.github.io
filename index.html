<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Love Heart</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* Kalp container */
.heart {
  position: relative;
  width: 300px;
  height: 300px;
}

/* Yazılar */
.love {
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: 0 0;
  color: #ff9bdc;
  font-size: 14px;
  white-space: nowrap;
  animation: rotate 8s linear infinite;
}

/* Animasyon */
@keyframes rotate {
  from {
    transform: rotate(0deg) translateX(120px) rotate(0deg);
  }
  to {
    transform: rotate(360deg) translateX(120px) rotate(-360deg);
  }
}
</style>
</head>

<body>

<div class="heart">
  <!-- Aynı yazıyı çoğaltıyoruz -->
  <div class="love" style="animation-delay:0s">I love you</div>
  <div class="love" style="animation-delay:0.5s">I love you</div>
  <div class="love" style="animation-delay:1s">I love you</div>
  <div class="love" style="animation-delay:1.5s">I love you</div>
  <div class="love" style="animation-delay:2s">I love you</div>
  <div class="love" style="animation-delay:2.5s">I love you</div>
  <div class="love" style="animation-delay:3s">I love you</div>
  <div class="love" style="animation-delay:3.5s">I love you</div>
</div>

</body>
</html>
