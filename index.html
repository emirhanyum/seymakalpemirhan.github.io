<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kalpler</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
}

/* Kalp yazıları */
.love_word {
  position: absolute;
  color: #ea80b0;
  font-size: 1.4rem;
  transform: translateY(-100%) rotateZ(-30deg);
  text-shadow: 0 0 10px #fff;
  letter-spacing: 2px;
  white-space: nowrap;
}

/* Yatay animasyon */
.love_horizontal {
  animation: horizontal 10s infinite alternate ease-in-out;
}

@keyframes horizontal {
  0% { transform: translateX(0) rotateZ(-30deg); }
  100% { transform: translateX(200px) rotateZ(-30deg); }
}
</style>
</head>
<body>

<div id="ui"></div>

<script>
// Kalp yazıları için örnek
const ui = document.getElementById("ui");

// 10 tane kalp yazısı oluştur
for(let i=0;i<10;i++){
  const el = document.createElement("div");
  el.className = "love_word love_horizontal";
  el.innerText = "I love you";

  // Başlangıç pozisyonu rastgele
  el.style.top = Math.random() * window.innerHeight + "px";
  el.style.left = Math.random() * window.innerWidth + "px";

  // Farklı animasyon gecikmesi
  el.style.animationDelay = (i * 0.3) + "s";

  ui.appendChild(el);
}
</script>

</body>
</html>
