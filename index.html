<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Love Heart</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 500px;
  height: 500px;
}

/* Yazılar */
.love {
  position: absolute;
  color: #ff9bdc;
  font-size: 13px;
  white-space: nowrap;
  text-shadow: 0 0 8px #ff9bdc;
}

/* Dönme efekti */
.container {
  animation: rotateHeart 20s linear infinite;
}

@keyframes rotateHeart {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container" id="heart"></div>

<script>
const container = document.getElementById("heart");
const count = 120; // daha fazla yazı

for (let i = 0; i < count; i++) {

  let t = Math.PI * 2 * (i / count);

  // ❤️ KALP FORMÜLÜ
  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = 13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

  let el = document.createElement("div");
  el.className = "love";
  el.innerText = "I love you";

  let scale = 12;

  el.style.left = (250 + x * scale) + "px";
  el.style.top  = (250 - y * scale) + "px";

  container.appendChild(el);
}
</script>

</body>
</html>
